<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>My Cute Site</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #ffd6e7, #d6e6ff);
  text-align: center;
  color: #333;
}

h1 {
  margin-top: 40px;
  font-size: 2.5rem;
}

p {
  color: #555;
  margin-top: 0;
}

/* buttons */
.buttons {
  margin-top: 30px;
}

button {
  padding: 12px 20px;
  border: none;
  border-radius: 12px;
  cursor: pointer;
  margin: 10px;
  font-size: 1rem;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.05);
}

.pink {
  background: #ff7eb6;
  color: white;
}

.blue {
  background: #7ec8ff;
  color: white;
}

/* sections */
.section {
  margin: 80px auto;
  padding: 40px;
  max-width: 800px;
  background: rgba(255,255,255,0.5);
  border-radius: 20px;
  backdrop-filter: blur(10px);
  box-shadow: 0 10px 30px rgba(0,0,0,0.1);
}

/* container */
.container {
  padding: 30px;
}

/* playlist grid */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
  gap: 20px;
  max-width: 1100px;
  margin: 30px auto;
}

/* playlist cards */
.card {
  background: rgba(255, 255, 255, 0.6);
  backdrop-filter: blur(10px);
  border-radius: 20px;
  padding: 15px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.1);
  transition: transform 0.3s ease, box-shadow 0.3s ease;
}

.card:hover {
  transform: translateY(-5px);
  box-shadow: 0 15px 40px rgba(255, 126, 182, 0.25);
}

.card h2 {
  margin-bottom: 8px;
  font-size: 1.1rem;
}

/* spotify embed */
.card iframe {
  width: 100%;
  height: 152px;
  border: none;
  border-radius: 12px;
}

/* mobile */
@media (max-width: 600px) {
  h1 {
    font-size: 2rem;
  }

  .grid {
    grid-template-columns: 1fr;
    padding: 10px;
  }
}
</style>
</head>

<body>

<h1>🎀 My Aesthetic Website</h1>

<div class="buttons">

  <button class="pink" onclick="scrollToSection('study')">
    Start Learning 🎀
  </button>

  <button class="blue" onclick="scrollToSection('challenge')">
    Daily Challenge 💙
  </button>

  <button class="pink" onclick="scrollToSection('music')">
    Playlist 🎧
  </button>

</div>

<!-- study -->
<div id="study" class="section">
  <h2>📚 Study Zone</h2>
  <p>Welcome to your learning space!</p>
</div>

<!-- challenge -->
<div id="challenge" class="section">
  <h2>💖 Daily Challenge</h2>
  <p>Read for 20 minutes today!</p>
</div>

<!-- music section -->
<div id="music" class="section">
  <h2>🎧 Playlist Zone</h2>

  <div class="grid">

    <div class="card">
      <h2>Chill Vibes</h2>
      <iframe src="https://open.spotify.com/embed/playlist/37i9dQZF1DX4WYpdgoIcn6"></iframe>
    </div>

    <div class="card">
      <h2>Study Beats</h2>
      <iframe src="https://open.spotify.com/embed/playlist/37i9dQZF1DX8Uebhn9wzrS"></iframe>
    </div>

    <div class="card">
      <h2>Happy Mix</h2>
      <iframe src="https://open.spotify.com/embed/playlist/37i9dQZF1DXdPec7aLTmlC"></iframe>
    </div>

  </div>
</div>

<script>
function scrollToSection(id) {
  document.getElementById(id).scrollIntoView({
    behavior: "smooth"
  });
}
</script>

</body>
</html>
