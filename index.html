<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LevelUp</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="navbar">
  <div class="logo">🎀 LevelUp</div>

  <nav>
    <a href="#home">Home</a>
    <a href="#study">Study Zone</a>
    <a href="#goals">Goals</a>
    <a href="#wellness">Wellness</a>
    <a href="#creative">Creative</a>
    <a href="#ai">AI Helper</a>
  </nav>

  <div class="moon" onclick="toggleDarkMode()">🌙</div>
</header>

<section id="home" class="hero">
  <h1>LevelUp 🎀</h1>

  <div class="buttons">
    <button onclick="scrollToSection('study')">Start Learning 🎀</button>
  </div>
</section>

<section class="cards">

  <div class="card" id="study">
    <h3>Study Zone</h3>
    <button>Explore →</button>
  </div>

  <div class="card" id="ai">
    <h3>AI Helper</h3>
    <button onclick="openChat()">Explore →</button>
  </div>

</section>

<!-- CHAT MODAL -->
<div id="chatModal" class="modal">
  <div class="modal-content">
    <span class="close" onclick="closeChat()">×</span>

    <h2>🤖 LevelUp AI</h2>

    <div id="chatBox"></div>

    <input id="chatInput" placeholder="Ask something..." />
    <button onclick="sendMessage()">Send</button>

  </div>
</div>

<script src="script.js"></script>
</body>
</html>
